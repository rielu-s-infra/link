apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-links2-combined-ingress
  namespace: rielu-links2
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # ここには rewrite-target を書かない（グローバルに適用されるのを防ぐ）
spec:
  ingressClassName: nginx
  rules:
    - host: rielulink.uniproject.jp
      http:
        paths:
          # フロントエンド（rewriteなし：/assets/xxx がそのまま届く）
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rielu-links2-service
                port:
                  number: 3000
  tls:
    - hosts:
        - rielulink.uniproject.jp
      secretName: rielu-uniproject-jp-tls
