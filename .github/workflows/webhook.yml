name: Notify ArgoCD after push

on:
  push:
    branches:
      - main  # 監視するブランチ

jobs:
  notify-argocd:
    runs-on: ubuntu-latest
    steps:
      - name: Wait before notifying
        run: sleep 80  # 待機秒数（必要に応じて変更）

      - name: Send webhook to ArgoCD
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            "${{ secrets.ARGOCD_WEBHOOK_URL }}"